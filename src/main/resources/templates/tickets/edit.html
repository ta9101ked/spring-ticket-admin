<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Ticket</title>
    <style>
        body { font-family: sans-serif; margin: 24px; }
        label { display: block; margin-top: 10px; }
        .error { color: #991b1b; font-size: 0.85rem; }
        button { margin-top: 16px; }
    </style>
</head>
<body>
    <h1>Edit Ticket</h1>

    <form th:action="@{/tickets/{id}/edit(id=${ticket.id})}" method="post" th:object="${ticket}">
        <input type="hidden" th:field="*{id}"/>

        <label>
            Ticket No
            <input type="text" th:field="*{ticketNo}"/>
            <div class="error" th:if="${#fields.hasErrors('ticketNo')}" th:errors="*{ticketNo}"></div>
        </label>

        <label>
            Title
            <input type="text" th:field="*{title}"/>
            <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </label>

        <label>
            Status
            <select th:field="*{status}">
                <option value="">-- select --</option>
                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </label>

        <label>
            Priority
            <select th:field="*{priority}">
                <option value="">-- select --</option>
                <option th:each="p : ${priorities}" th:value="${p}" th:text="${p}"></option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></div>
        </label>

        <label>
            Requester Name
            <input type="text" th:field="*{requesterName}"/>
            <div class="error" th:if="${#fields.hasErrors('requesterName')}" th:errors="*{requesterName}"></div>
        </label>

        <button type="submit">Update</button>
    </form>

    <p><a th:href="@{/tickets}">Back to Tickets</a></p>
</body>
</html>
